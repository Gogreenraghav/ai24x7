<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI24x7 - AI Automation Agency</title>
    <script type="module" crossorigin="" src="./assets/index-GTZa-_IJ.js"></script>
    <link rel="stylesheet" crossorigin="" href="./assets/index-CaZL_JPW.css"/>
  <script src="" defer=""></script></head>
  <body>
    <div id="root"></div>
  


<!-- AI24X7-PATCH v4 -->
<style>
/* ===== HOW IT WORKS: Force steps visible (override scroll-animation opacity) ===== */
#how-it-works [class*="transition-all"][class*="opacity-0"],
#how-it-works .opacity-0 {
  opacity: 1 !important;
  transform: translateY(0) !important;
}
/* Ensure step grid is 3 columns on desktop */
#how-it-works .grid {
  display: grid !important;
}
#how-it-works [class*="md\:grid-cols-3"] {
  grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
}

/* ===== CONTACT/LEAD FORM MODAL: Scrollable on all devices ===== */
.fixed.inset-0[class*="z-[100]"] {
  align-items: flex-start !important;
  overflow-y: auto !important;
  padding-top: 16px !important;
  padding-bottom: 16px !important;
  -webkit-overflow-scrolling: touch !important;
}
@media (max-width: 768px) {
  .fixed.inset-0[class*="z-[100]"] {
    padding: 8px !important;
  }
  .fixed.inset-0[class*="z-[100]"] > div:last-child {
    max-height: none !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch !important;
  }
}
/* Ensure modal inner is scrollable */
[class*="max-h-\[90vh\]"] {
  max-height: 85vh !important;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
}

/* ===== SOLUTIONS SECTION: Animation fix ===== */
#solutions [class*="opacity-0"] {
  opacity: 1 !important;
  transform: translateY(0) !important;
}
</style>

<script>
(function(){
"use strict";

/* ---------- React Fiber Utilities ---------- */
function fiberKey(el){
  return Object.keys(el).find(function(k){return k.startsWith("__reactFiber");});
}
function getFiber(el){
  var k=fiberKey(el); return k?el[k]:null;
}

/* Walk fiber tree - calls cb(fiber), returns first truthy result */
function walkFiber(fiber, cb, depth){
  if(!fiber||depth>200) return null;
  var r=cb(fiber);
  if(r) return r;
  return walkFiber(fiber.child,cb,depth+1)||walkFiber(fiber.sibling,cb,depth+1);
}

/* Get all useState dispatchers from a fiber's hook list */
function getDispatchers(fiber){
  var out=[]; var h=fiber&&fiber.memoizedState;
  while(h){
    if(h.queue&&h.queue.dispatch) out.push({dispatch:h.queue.dispatch, state:h.memoizedState});
    h=h.next;
  }
  return out;
}

/* Find dispatcher where current state matches predicate */
function findDispatch(predicate){
  var root=document.getElementById("root");
  var f=getFiber(root);
  if(!f) return null;
  return walkFiber(f,function(fiber){
    var hooks=getDispatchers(fiber);
    for(var i=0;i<hooks.length;i++){
      if(predicate(hooks[i].state,hooks[i].dispatch,i,hooks)) return hooks[i].dispatch;
    }
    return null;
  },0);
}

/* ---------- Open Lead Modal ---------- */
function openLeadModal(){
  /* Try React fiber: find App-level boolean false state (isOpen=false initially) */
  /* App has: [isOpen:bool, industrySlug:string, isIndustryModalOpen:bool] */
  /* Look for a fiber whose first hook is boolean false AND second hook is string/null */
  var dispatch=findDispatch(function(state,d,idx,all){
    return idx===0 && state===false && all.length>=2 && 
           (typeof all[1].state==="string"||all[1].state===null);
  });
  if(dispatch){dispatch(true);return;}
  
  /* Fallback: find any "Get Started" or "Book" CTA button */
  var btns=Array.from(document.querySelectorAll("button,a")).filter(function(b){
    var t=b.textContent.trim();
    return t.includes("Get Started")||t.includes("Book")||t.includes("Demo")||t.includes("Schedule");
  });
  if(btns.length>0){btns[0].click();}
}

/* ---------- Reset Industry Category Filter (View All) ---------- */
function resetIndustryFilter(){
  var sec=document.getElementById("industries");
  if(!sec) return;
  var f=getFiber(sec);
  if(!f) return;
  /* IndustryMatrix has category state: first hook is string (selected category) */
  var dispatch=walkFiber(f,function(fiber){
    var hooks=getDispatchers(fiber);
    /* Look for a hook with a string value (category name) as first state */
    if(hooks.length>=1 && typeof hooks[0].state==="string"){
      return hooks[0].dispatch;
    }
    return null;
  },0);
  if(dispatch){
    /* Set to first category value to force re-render showing first group */
    /* Then we'll show all by cycling — but simplest: remove filter */
    dispatch(null);
    dispatch(undefined);
    /* React will use last dispatched value */
  }
  /* Show all visible cards regardless */
  sec.querySelectorAll("[style*='display:none'],[style*='display: none']").forEach(function(el){
    el.style.display="block";
  });
}

/* ---------- Apply all fixes after React mounts ---------- */
function applyFixes(){
  /* 1. LEARN MORE BUTTONS in ThreePillars (solutions section) */
  var learnMoreBtns=Array.from(document.querySelectorAll("#solutions button")).filter(function(b){
    return b.textContent.trim().includes("Learn More");
  });
  learnMoreBtns.forEach(function(btn){
    if(btn._ai24) return;
    btn._ai24=1;
    btn.style.cursor="pointer";
    btn.addEventListener("click",function(e){
      e.preventDefault(); e.stopPropagation();
      openLeadModal();
    });
  });

  /* 2. VIEW ALL INDUSTRIES BUTTON */
  var viewAllBtn=Array.from(document.querySelectorAll("#industries button")).find(function(b){
    return b.textContent.trim().includes("View All Industries");
  });
  if(viewAllBtn && !viewAllBtn._ai24){
    viewAllBtn._ai24=1;
    viewAllBtn.addEventListener("click",function(){
      resetIndustryFilter();
      /* Also scroll to show industry grid */
      var grid=document.querySelector("#industries .grid");
      if(grid) grid.scrollIntoView({behavior:"smooth",block:"start"});
      viewAllBtn.textContent="All Industries Shown ✓";
      viewAllBtn.style.opacity="0.7";
    });
  }

  /* 3. HOW IT WORKS — force steps visible (intersection observer may not fire) */
  var how=document.getElementById("how-it-works");
  if(how){
    /* Find all step divs with opacity-0 and force them visible */
    how.querySelectorAll("[class]").forEach(function(el){
      var cls=el.className||"";
      if(cls.includes("opacity-0")){
        el.style.opacity="1";
        el.style.transform="none";
      }
    });
  }
}

/* Run after React fully mounts */
setTimeout(applyFixes, 800);
setTimeout(applyFixes, 2000);

/* Watch for modal opens (React re-renders) */
var _obs=new MutationObserver(function(muts){
  muts.forEach(function(m){
    if(m.addedNodes.length) setTimeout(applyFixes,300);
  });
});
document.addEventListener("DOMContentLoaded",function(){
  _obs.observe(document.body,{childList:true,subtree:false});
});

})();
</script>
<!-- END-PATCH -->
</body></html>
